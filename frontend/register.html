<!DOCTYPE html>
<html>
<head>
    <title>Register - CivicReporter</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="w-full max-w-md bg-white p-8 rounded-lg shadow-md">
        <h2 class="text-2xl font-bold text-center mb-6">Create Your Account</h2>
        <form id="registerForm">
            <div class="mb-4">
                <label class="block text-gray-700">Full Name</label>
                <input type="text" id="fullName" class="w-full px-3 py-2 border rounded" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700">Email</label>
                <input type="email" id="email" class="w-full px-3 py-2 border rounded" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700">Password</label>
                <input type="password" id="password" class="w-full px-3 py-2 border rounded" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700">Account Type</label>
                <select id="userType" class="w-full px-3 py-2 border rounded">
                    <option value="citizen">Citizen</option>
                    <option value="municipal_official">Municipal Official</option>
                    <option value="inspection_officer">Inspection Officer</option> </select>
            </div>
            <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">Register</button>
        </form>
        <p class="text-center mt-4">Already have an account? <a href="login.html" class="text-blue-500">Login</a></p>
        <div id="message" class="text-center mt-4"></div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const userType = document.getElementById('userType').value;
            const messageDiv = document.getElementById('message');

            const response = await fetch('http://127.0.0.1:8000/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ full_name: fullName, email, password, user_type: userType })
            });

            if (response.ok) {
                messageDiv.textContent = 'Registration successful! Please login.';
                messageDiv.className = 'text-green-500';
                setTimeout(() => window.location.href = 'login.html', 2000);
            } else {
                const error = await response.json();
                messageDiv.textContent = `Error: ${error.detail}`;
                messageDiv.className = 'text-red-500';
            }
        });
    </script>
</body>
</html>
